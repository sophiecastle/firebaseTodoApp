<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firehawk Assessment 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3>Create To Do List:</h3>
    <input class="form-control mb-2" id="todo_input" placeholder="Enter Task">
    <button class="btn btn-primary" id="addBtn">Add Task</button>
    <hr>
    <h4>To Do List:</h4>
    <ul id="list" class="list-group mt-3"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        deleteDoc,
        updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
        getDatabase,
        ref,
        set,
        onValue
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCeU4aPVv4ejVxyXgOq9t1jS8YncA1bFzY",
        authDomain: "tutorial1-78bed.firebaseapp.com",
        projectId: "tutorial1-78bed",
        storageBucket: "tutorial1-78bed.firebasestorage.app",
        messagingSenderId: "577588757396",
        appId: "1:577588757396:web:01605bbfa34b2057ec4581"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);
    const todosRef = collection(db, "todos");

    const realtimeDb = getDatabase(app);
    const syncRef = ref(realtimeDb, "sync/lastUpdated");

    async function notifySync() {
        await set(syncRef, Date.now());
    }

    function renderTodo(docData, docRef) {
        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        const textSpan = document.createElement("span");
        textSpan.textContent = docData.text;

        if (docData.completed === true) {
            textSpan.style.textDecoration = "line-through";
            textSpan.classList.add("text-muted");
        }

        const completeBtn = document.createElement("button");
        completeBtn.textContent = "✔";
        completeBtn.className = "btn btn-outline-success btn-sm me-2";
        completeBtn.addEventListener("click", async () => {
            await updateDoc(docRef, { completed: true });
            await notifySync();
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "✖";
        deleteBtn.className = "btn btn-outline-danger btn-sm";
        deleteBtn.addEventListener("click", async () => {
            await deleteDoc(docRef);
            await notifySync();
        });

        const buttonGroup = document.createElement("div");
        buttonGroup.appendChild(completeBtn);
        buttonGroup.appendChild(deleteBtn);

        li.appendChild(textSpan);
        li.appendChild(buttonGroup);

        document.getElementById("list").appendChild(li);
    }

    onSnapshot(todosRef, (snapshot) => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        snapshot.forEach((docSnap) => {
            renderTodo(docSnap.data(), docSnap.ref);
        });
    });

    onValue(syncRef, (snapshot) => {
        console.log("Realtime Database sync triggered:", snapshot.val());
    });

    const button = document.getElementById("addBtn");
    button.addEventListener("click", async () => {
        const input = document.getElementById("todo_input");
        const text = input.value.trim();

        if (text === "") {
            return;
        }

        await addDoc(todosRef, {
            text: text,
            completed: false,
            timestamp: Date.now()
        });

        input.value = "";
        input.focus();

        await notifySync();

    });
</script>
</body>
</html>
